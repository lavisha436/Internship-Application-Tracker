<!doctype html>
<html>
  <head>
    <title>Internship Tracker</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm"
    >
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
          Internship Tracker
        </a>

        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{% url 'home' %}"> Home </a>

          {% if user.is_authenticated %}

          <a class="nav-link" href="{% url 'application_list' %}">
            Applications
          </a>

          <a class="nav-link" href="{% url 'add_application' %}">
            Add Application
          </a>

          <a class="nav-link text-danger" href="{% url 'logout_user' %}">
            Logout
          </a>

          {% else %}

          <a class="nav-link" href="{% url 'login_user' %}"> Login </a>

          <a class="nav-link" href="{% url 'register_user' %}"> Register </a>

          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container py-4">{% block content %} {% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
